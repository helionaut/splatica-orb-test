name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - eugeniy/**

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run aggregate checks
        run: make check
