name: Publish RGB-D Sanity Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - reports/published/tum_rgbd_fr1_xyz_sanity/**
      - .github/workflows/publish-rgbd-sanity.yml

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Validate published bundle exists
        run: test -f reports/published/tum_rgbd_fr1_xyz_sanity/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/published/tum_rgbd_fr1_xyz_sanity

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
